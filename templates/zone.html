{% extends "base.html" %}

{% block title %}EyeQ - {{ zone_name }} {% endblock %}

{% block extra_css %}
<style>
.zone-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.zone-title { font-size: 1.5rem; font-weight: 600; display: flex; align-items: center; gap: 0.75rem; }

.video-large {
    width: 100%; border-radius: 16px; overflow: hidden; position: relative;
    box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7); background: #000; border: 1px solid var(--border);
}

.video-large img { width: 100%; height: auto; max-height: 75vh; object-fit: contain; display: block; }
</style>
{% endblock %}

{% block content %}
<div class="dashboard-container">
    <div class="zone-header">
        <div class="zone-title">
            <i class="fa-solid fa-video" style="color: var(--danger)"></i> 
            {{ zone_name }} Live Intelligence
        </div>
        <a href="/live" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; transition: all 0.2s;">
            <i class="fa-solid fa-arrow-left"></i> Return to Grid
        </a>
    </div>
    
    <div class="video-large">
        <div style="position: absolute; top: 16px; left: 16px; z-index: 10; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.1);">
            <div style="width: 8px; height: 8px; background: var(--danger); border-radius: 50%; box-shadow: 0 0 8px var(--danger); animation: blink 1.5s infinite;"></div> LIVE 
        </div>
        <img src="/video_feed/{{ zone_id }}" alt="{{ zone_name }} Live Feed" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100%\' height=\'100%\'><rect width=\'100%\' height=\'100%\' fill=\'black\'/><text x=\'50%\' y=\'50%\' fill=\'white\' font-family=\'sans-serif\' font-size=\'20\' text-anchor=\'middle\'>SIGNAL LOST</text></svg>'">
    </div>
</div>
{% endblock %}
